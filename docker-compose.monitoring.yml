# =============================================================================
# Docker Compose - Monitoring Stack (Grafana + Loki + Promtail)
# =============================================================================
# This is a SEPARATE monitoring stack that runs alongside the main application.
# Usage: docker compose -f docker-compose.monitoring.yml up -d
# =============================================================================

services:
  # -------------------------------------------------------------------
  # Loki: Log aggregation and storage backend
  # Receives logs from Promtail and stores them for querying via Grafana
  # -------------------------------------------------------------------
  loki:
    image: grafana/loki:latest
    container_name: lms-loki
    command: -config.file=/etc/loki/loki-config.yml
    ports:
      - "127.0.0.1:3100:3100"
    volumes:
      - ./monitoring/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:3100/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # -------------------------------------------------------------------
  # Promtail: Log collector agent
  # Reads Docker container logs and ships them to Loki
  # Mounts Docker socket and container log directory for auto-discovery
  # -------------------------------------------------------------------
  promtail:
    image: grafana/promtail:latest
    container_name: lms-promtail
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./monitoring/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      loki:
        condition: service_healthy
    restart: unless-stopped

  # -------------------------------------------------------------------
  # Grafana: Visualization and dashboarding
  # Access at http://localhost:3001 (login: admin / GRAFANA_PASSWORD)
  # Loki is pre-configured as a data source
  # -------------------------------------------------------------------
  grafana:
    image: grafana/grafana:latest
    container_name: lms-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      loki:
        condition: service_healthy
    restart: unless-stopped

volumes:
  loki_data:
  grafana_data:
