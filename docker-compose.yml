


services:
  postgres:
    image: postgres:16-alpine
    container_name: lms-postgres
    environment:
      POSTGRES_USER: lms
      POSTGRES_PASSWORD: lms_password
      POSTGRES_DB: lms_db
    ports:
      - "127.0.0.1:5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lms -d lms_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Single Redis instance for both queue and cache (saves ~100MB RAM on 2GB VPS)
  redis:
    image: redis:7-alpine
    container_name: lms-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy noeviction
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redisdata:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO REMOVED — using AWS S3 directly, no need for local S3 emulation

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: lms-backend:latest
    ports:
      - "4000:4000"
    environment:
      - DATABASE_URL=postgresql://lms:lms_password@postgres:5432/lms_db?schema=public
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - WEBHOOK_SECRET=${WEBHOOK_SECRET:?WEBHOOK_SECRET is required}
      - SEPAY_API_KEY=${SEPAY_API_KEY:?SEPAY_API_KEY is required}
      - PAYMENT_CODE_PREFIX=${PAYMENT_CODE_PREFIX:?PAYMENT_CODE_PREFIX is required}
      - BANK_CODE=${BANK_CODE:?BANK_CODE is required}
      - BANK_ACCOUNT=${BANK_ACCOUNT:?BANK_ACCOUNT is required}
      - BANK_ACCOUNT_NAME=${BANK_ACCOUNT_NAME:?BANK_ACCOUNT_NAME is required}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - API_URL=${API_URL:-http://localhost:4000/api/v1}
      - GEMINI_API_KEY=${GEMINI_API_KEY:?GEMINI_API_KEY is required}
      - MEDIA_ORPHAN_TTL_HOURS=24
      - MEDIA_ORPHAN_CLEANUP_BATCH_SIZE=100
      - UPLOAD_TMP_DIR=/tmp/lms-uploads
      # Single Redis for both queue and cache
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_CACHE_HOST=redis
      - REDIS_CACHE_PORT=6379
      - PORT=4000
      - NODE_ENV=production
      # AWS S3 config (real S3, not MinIO)
      - S3_PROVIDER=${S3_PROVIDER:-aws}
      - S3_ENDPOINT=${S3_ENDPOINT:-}
      - S3_PUBLIC_ENDPOINT=${S3_PUBLIC_ENDPOINT:?S3_PUBLIC_ENDPOINT is required}
      - S3_REGION=${S3_REGION:?S3_REGION is required}
      - S3_BUCKET=${S3_BUCKET:?S3_BUCKET is required}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:?S3_ACCESS_KEY is required}
      - S3_SECRET_KEY=${S3_SECRET_KEY:?S3_SECRET_KEY is required}
      - S3_FORCE_PATH_STYLE=${S3_FORCE_PATH_STYLE:-false}
      - S3_USE_SSL=${S3_USE_SSL:-true}
      - S3_SIGNED_URL_EXPIRES=${S3_SIGNED_URL_EXPIRES:-3600}
    volumes:
      - hls_tmp:/tmp/lms-uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:4000/api/v1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:4000/api/v1}
    image: lms-frontend:latest
    container_name: lms-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:4000/api/v1}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:?NEXTAUTH_SECRET is required}
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:3000 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  nginx:
    image: nginx:alpine
    container_name: lms-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/nginx-health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

volumes:
  pgdata:
  redisdata:
  hls_tmp:
