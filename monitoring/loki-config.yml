# ─────────────────────────────────────────────────────────────────────────────
# Loki Configuration — Centralized Log Storage
# Receives log streams from Promtail and stores them for Grafana queries.
# ─────────────────────────────────────────────────────────────────────────────

auth_enabled: false

server:
  http_listen_port: 3100

common:
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  # Reject old logs (older than 168h = 7 days)
  reject_old_samples: true
  reject_old_samples_max_age: 168h

# Compactor removes old data automatically
compactor:
  working_directory: /loki/compactor
