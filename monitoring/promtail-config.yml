# ─────────────────────────────────────────────────────────────────────────────
# Promtail Configuration — Docker Container Log Collector
# Automatically discovers and ships logs from all Docker containers to Loki.
# ─────────────────────────────────────────────────────────────────────────────

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  # Track read positions so Promtail resumes correctly after restarts
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    static_configs:
      - targets:
          - localhost
        labels:
          job: docker
          __path__: /var/lib/docker/containers/*/*-json.log
    pipeline_stages:
      # Parse Docker JSON log format
      - docker: {}
      # Extract container name from the path for labeling
      - regex:
          source: filename
          expression: '/var/lib/docker/containers/(?P<container_id>[^/]+)/.*'
