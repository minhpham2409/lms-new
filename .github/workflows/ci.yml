name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend:
    name: Backend Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Security audit
        working-directory: backend
        run: npm audit --audit-level=high

      - name: Generate Prisma Client
        working-directory: backend
        run: npx prisma generate

      - name: Build
        working-directory: backend
        run: npm run build

      - name: Test
        working-directory: backend
        run: npm test -- --runInBand --passWithNoTests
        env:
          DATABASE_URL: "postgresql://test:test@localhost:5432/test_db"
          JWT_SECRET: "ci-test-secret"
          NODE_ENV: test

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Security audit
        working-directory: frontend
        run: npm audit --audit-level=high

      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: "http://localhost:4000/api/v1"

  docker:
    name: Docker Compose Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Docker Compose
        run: docker compose config
        env:
          JWT_SECRET: "ci-test-secret"
          WEBHOOK_SECRET: "ci-test-webhook"
          NEXTAUTH_SECRET: "ci-test-nextauth"
          SEPAY_API_KEY: "ci-test"
          PAYMENT_CODE_PREFIX: "LMS"
          BANK_CODE: "ci-test"
          BANK_ACCOUNT: "ci-test"
          BANK_ACCOUNT_NAME: "ci-test"
          MINIO_ROOT_USER: "ci-test"
          MINIO_ROOT_PASSWORD: "ci-test-password"
          S3_ACCESS_KEY: "ci-test"
          S3_SECRET_KEY: "ci-test"

  security-scan:
    name: Security Scan (Trivy)
    runs-on: ubuntu-latest
    needs: [docker]
    steps:
      - uses: actions/checkout@v4

      - name: Build Backend Image
        run: docker build -t lms-backend:ci ./backend

      - name: Scan Backend Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'lms-backend:ci'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      - name: Build Frontend Image
        run: docker build -t lms-frontend:ci ./frontend
        env:
          NEXT_PUBLIC_API_URL: "http://localhost:4000/api/v1"

      - name: Scan Frontend Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'lms-frontend:ci'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: [backend, frontend, docker, security-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/lms-new
            git pull origin main
            docker compose up -d --build --remove-orphans
            docker image prune -f
            echo "✅ Deploy completed at $(date)"
