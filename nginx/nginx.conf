# =============================================================================
# Nginx Reverse Proxy & Load Balancer Configuration
# =============================================================================
# This config serves as the single entry point for the LMS platform.
# It routes traffic to the backend API and frontend application,
# provides gzip compression, and supports large video uploads.
# =============================================================================

# Worker configuration - auto-detect CPU cores
worker_processes auto;

events {
    # Maximum simultaneous connections per worker
    worker_connections 1024;
}

http {
    # Include MIME types for proper content serving
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging format with upstream response time for monitoring
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" upstream_response_time=$upstream_response_time';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # Performance optimizations
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;

    # -------------------------------------------------------------------
    # Gzip Compression
    # Compresses text-based responses to reduce bandwidth usage
    # -------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        application/x-javascript
        image/svg+xml;

    # -------------------------------------------------------------------
    # Upstream: Backend API Pool
    # Uses least_conn algorithm to distribute requests to the instance
    # with the fewest active connections (ideal for long-running API calls)
    # -------------------------------------------------------------------
    upstream backend_pool {
        least_conn;
        server backend:4000;
    }

    # -------------------------------------------------------------------
    # Upstream: Frontend Pool
    # Next.js application server
    # -------------------------------------------------------------------
    upstream frontend_pool {
        server frontend:3000;
    }

    # -------------------------------------------------------------------
    # Main Server Block
    # -------------------------------------------------------------------
    server {
        listen 80;
        server_name _;

        # Maximum upload size - 500MB for video uploads
        client_max_body_size 500M;

        # Increase proxy buffer sizes for large responses
        proxy_buffer_size       128k;
        proxy_buffers           4 256k;
        proxy_busy_buffers_size 256k;

        # -----------------------------------------------------------
        # Location: Backend API
        # All requests to /api/ are proxied to the backend pool
        # -----------------------------------------------------------
        location /api/ {
            proxy_pass http://backend_pool;

            # Pass original client information to backend
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support (if needed for real-time features)
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Timeout settings for long-running operations (video processing)
            proxy_connect_timeout 60s;
            proxy_send_timeout    300s;
            proxy_read_timeout    300s;
        }

        # -----------------------------------------------------------
        # Location: Frontend Application
        # All other requests are proxied to the Next.js frontend
        # -----------------------------------------------------------
        location / {
            proxy_pass http://frontend_pool;

            # Pass original client information to frontend
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support for Next.js HMR (Hot Module Replacement)
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # -----------------------------------------------------------
        # Health check endpoint for monitoring
        # -----------------------------------------------------------
        location /nginx-health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }
}
